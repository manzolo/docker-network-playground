name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: -e SC1091 -e SC2086
        with:
          severity: error
          scandir: '.'
          additional_files: 'menu.sh'

  compose-lint:
    name: Compose validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate docker-compose.yml
        run: docker compose config -q

  build-and-test:
    name: Build & integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images
        run: ./menu.sh build

      - name: Start environment
        run: ./menu.sh start

      - name: Wait for containers to become healthy
        run: |
          set -e
          deadline=$(( $(date +%s) + 180 ))
          while :; do
            total=$(docker ps -q | wc -l)
            healthy=$(docker ps --filter "health=healthy" -q | wc -l)
            starting=$(docker ps --filter "health=starting" -q | wc -l)
            unhealthy=$(docker ps --filter "health=unhealthy" -q | wc -l)

            echo "containers: total=$total healthy=$healthy starting=$starting unhealthy=$unhealthy"

            if [ "$unhealthy" -gt 0 ]; then
              echo "::error::At least one container is unhealthy"
              docker ps
              exit 1
            fi

            if [ "$starting" -eq 0 ] && [ "$total" -gt 0 ]; then
              echo "All containers reported."
              break
            fi

            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error::Timeout waiting for containers to become healthy"
              docker ps
              exit 1
            fi

            sleep 5
          done

      - name: Show status
        run: ./menu.sh status

      - name: Run connectivity tests
        run: ./menu.sh test-connectivity

      - name: Run DNS tests
        run: ./menu.sh test-dns

      - name: Generate monitoring data
        run: ./menu.sh monitor

      - name: Verify dashboard reachable
        run: |
          curl -fsS http://localhost/ > /dev/null
          curl -fsS http://localhost/dashboard/ > /dev/null
          curl -fsS http://localhost/dashboard/api/status.json | head -c 200
          echo

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans || true
